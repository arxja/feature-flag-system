name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: cd packages/sdk && npm run build

      # - name: Run SDK tests
      #   run: cd packages/sdk && npm test

      - name: Publish to npm
        run: cd packages/sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}