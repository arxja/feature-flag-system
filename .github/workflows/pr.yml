name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: |
          cd packages/backend && npm run type-check || true
          cd packages/frontend && npm run type-check || true
          cd packages/sdk && npm run type-check || true

      # - name: Run tests
      #   run: npm test
      #   env:
      #     NODE_ENV: test
      #     MONGODB_URI: mongodb://localhost:27017/feature_flags_test
      #     REDIS_URL: redis://localhost:6379

      - name: Build
        run: npm run build

      - name: Check for .env files
        run: |
          if find . -name ".env" -not -path "./node_modules/*" | grep -q .; then
            echo "❌ Found .env file! Remove it before merging."
            exit 1
          fi

      - name: Check for console.log
        run: |
          if grep -r "console\.log" packages/backend/src --include="*.ts" | grep -v "__tests__" | grep -q .; then
            echo "❌ Found console.log statements in backend!"
            exit 1
          fi